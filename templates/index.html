<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bibliometría Dashboard</title>
    <script src="https://unpkg.com/dropzone@5/dist/min/dropzone.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/dropzone@5/dist/min/dropzone.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7f9; padding: 30px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; border-left: 6px solid #3498db; padding-left: 20px; margin-bottom: 40px; }
        
        .dropzone { border: 2px dashed #3498db; border-radius: 10px; background: #fcfdfe; margin-bottom: 30px; }
        
        .export-bar { display: flex; gap: 15px; justify-content: flex-end; margin-bottom: 30px; }
        .btn { padding: 12px 20px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 0.85em; transition: 0.3s; }
        .btn-excel { background: #27ae60; }
        .btn-word { background: #2980b9; }
        .btn-geo { background: #7f8c8d; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .grid-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .card { padding: 25px; border-radius: 12px; background: #fff; border: 1px solid #edf2f7; text-align: center; }
        .card h4 { color: #a0aec0; font-size: 0.75em; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .card span { color: #2d3748; font-size: 1.8em; font-weight: 800; display: block; margin-top: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 40px; }
        th { text-align: left; padding: 15px; background: #f8fafc; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.95em; color: #1e293b; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bibliometric Analysis Tool</h1>

    <form action="/upload" class="dropzone" id="dzMain"></form>

    <div id="dashboard" style="display:none;">
        <div class="export-bar">
            <a href="/exportar/excel" class="btn btn-excel">Descargar Excel</a>
            <a href="/exportar/paises" class="btn btn-geo">Excel Geográfico</a>
            <a href="/exportar/word" class="btn btn-word">Exportar Word (Todo)</a>
        </div>

        <div class="grid-stats">
            <div class="card"><h4>Años</h4><span id="v-years"></span></div>
            <div class="card"><h4>Citas</h4><span id="v-total"></span></div>
            <div class="card"><h4>Media</h4><span id="v-avg"></span></div>
            <div class="card"><h4>Citados</h4><span id="v-perc"></span></div>
        </div>

        <div style="margin-top: 50px;">
            <h3>Productividad por Autor</h3>
            <canvas id="chartAutores" height="100"></canvas>
        </div>

        <div style="margin-top: 50px;">
            <h3>Top 10 Trabajos</h3>
            <table>
                <thead><tr><th>Título</th><th style="width:100px">Citas</th></tr></thead>
                <tbody id="v-table"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let chartObj = null;
    Dropzone.options.dzMain = {
        dictDefaultMessage: "Arrastra el dataset aquí para procesar",
        init: function() {
            this.on("success", function(file, res) {
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('v-years').innerText = res.rango_anios.mensaje_formateado;
                document.getElementById('v-total').innerText = res.total_citas.mensaje_formateado;
                document.getElementById('v-avg').innerText = res.impacto_citas.mensaje_formateado;
                document.getElementById('v-perc').innerText = res.proporcion_citadas.mensaje_formateado;

                const tbody = document.getElementById('v-table');
                tbody.innerHTML = res.analisis_avanzado.top_trabajos.map(t => 
                    `<tr><td>${t.titulo}</td><td><b>${t.citas}</b></td></tr>`
                ).join('');

                const ctx = document.getElementById('chartAutores').getContext('2d');
                if(chartObj) chartObj.destroy();
                chartObj = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: res.analisis_avanzado.top_10.map(a => a.Author),
                        datasets: [{ label: 'Artículos', data: res.analisis_avanzado.top_10.map(a => a.Count), backgroundColor: '#3498db' }]
                    },
                    options: { indexAxis: 'y', plugins: { legend: { display: false } } }
                });
            });
        }
    };
</script>
</body>
</html>
