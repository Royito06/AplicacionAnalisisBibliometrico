<script>
    Dropzone.options.uploadDf = {
        paramName: "file", // Coincide con request.files['file'] en tu Python
        maxFilesize: 10,
        acceptedFiles: ".csv, .xls, .xlsx",
        dictDefaultMessage: "Arrastra tus archivos aquí o haz clic para subir",

        init: function () {
            // Esta función se ejecuta cuando Flask responde con éxito (return jsonify, 200)
            this.on("success", function (file, response) {
                console.log("Resumen del servidor:", response);

                // Accedemos a los datos de tu 'resumen_rodrigo'
                const total = response.metricas.total_articulos;
                const libros = response.resumen_contenido.libros.join(", ");

                // En lugar de un simple alert, puedes escribirlo en el HTML
                alert(`¡Éxito! Se cargaron ${total} artículos.\nEjemplos: ${libros}`);
            });

            this.on("error", function (file, message) {
                // Por si Flask devuelve un error 400 o 500
                alert("Error: " + (message.message || message));
            });
        }
    };
</script>
