<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Distribución por Países</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 40px; color: #2c3e50; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #3498db; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f9f9f9; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Volver al Dashboard</a>
        <h1>Producción Científica por País</h1>
        
        {% if paises %}
        <table>
            <thead>
                <tr>
                    <th>País / Región</th>
                    <th>Cantidad de Publicaciones</th>
                </tr>
            </thead>
            <tbody>
                {% for p in paises %}
                <tr>
                    <td>{{ p.pais }}</td>
                    <td>{{ p.cantidad }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p>No se encontraron datos de afiliación. Asegúrese de haber subido un archivo válido.</p>
        {% endif %}
    </div>
</body>
</html>
