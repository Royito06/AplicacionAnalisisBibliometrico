<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalles del Artículo</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 900px; margin: auto; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; width: 25%; font-weight: bold; }
        tr:hover { background-color: #f9f9f9; }
        .back-btn { display: inline-block; padding: 10px 15px; background: #007BFF; color: white; text-decoration: none; border-radius: 5px; }
        .back-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

    <a href="/top-trabajos" class="back-btn">← Volver al Top 10</a>

    {% if detalle.error %}
        <h2 style="color: red; margin-top: 20px;">{{ detalle.error }}</h2>
    {% else %}
        <h2 style="margin-top: 20px;">Ficha Técnica de la Publicación</h2>
        
        <table>
            <tbody>
                <!-- Recorremos todos los metadatos dinámicamente -->
                {% for columna, valor in detalle.items() %}
                <tr>
                    <th>{{ columna }}</th>
                    <td>{{ valor }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% endif %}

</body>
</html>
